services:
  postgres:
    image: postgres:16-alpine
    container_name: nyc_taxi_postgres
    environment:
      POSTGRES_DB: nyc_taxi
      POSTGRES_USER: nyc_user
      POSTGRES_PASSWORD: nyc_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nyc_user -d nyc_taxi"]
      interval: 5s
      timeout: 5s
      retries: 10

  pipeline:
    build: .
    container_name: nyc_taxi_pipeline
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: nyc_taxi
      POSTGRES_USER: nyc_user
      POSTGRES_PASSWORD: nyc_password
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  metabase:
    image: metabase/metabase:latest
    container_name: nyc_taxi_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase-data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  metabase-data:
