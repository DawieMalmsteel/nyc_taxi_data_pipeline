version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: nyc_taxi_postgres
    environment:
      POSTGRES_DB: nyc_taxi
      POSTGRES_USER: nyc_user
      POSTGRES_PASSWORD: nyc_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nyc_user -d nyc_taxi"]
      interval: 5s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    container_name: nyc_taxi_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase-data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy

  spark-master:
    image: bitnami/spark:3.5
    container_name: nyc_taxi_spark_master
    environment:
      - SPARK_MODE=master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./jobs:/app/jobs
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./dbt_project:/app/dbt_project
      - ./config.yaml:/app/config.yaml

  spark-worker:
    image: bitnami/spark:3.5
    container_name: nyc_taxi_spark_worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    volumes:
      - ./data:/app/data
    depends_on:
      - spark-master

volumes:
  pgdata:
  metabase-data:
